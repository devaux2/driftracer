<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#05060f" />
    <title>DRIFTRACER</title>
    <!-- styles are imported from src/main.ts so Vite bundles them with the build -->

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%2305060f'/><text y='13' x='1' font-size='13'>🏎️</text></svg>"
    />
  </head>
  <body>
    <div id="app">
      <canvas id="renderCanvas" touch-action="none"></canvas>

      <!-- Rotate-to-landscape nag (mobile portrait) -->
      <div id="rotate-prompt" class="overlay hidden">
        <div class="rotate-icon">⟳</div>
        <p>Rotate your device to landscape</p>
      </div>

      <!-- HUD is injected by src/ui/HUD.ts -->
      <!-- Touch controls are injected by src/input/TouchInput.ts -->
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
